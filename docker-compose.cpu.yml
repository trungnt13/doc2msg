# CPU-only Docker Compose for development and CI without GPU.
# Usage: docker compose -f docker-compose.cpu.yml up --build
services:
  doc2agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CARGO_FEATURES: ""
    image: doc2agent:cpu
    init: true
    restart: unless-stopped
    ports:
      - "${DOC2AGENT_PUBLISHED_PORT:-8080}:3000"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      DOC2AGENT_HOST: 0.0.0.0
      DOC2AGENT_PORT: 3000
      DOC2AGENT_REQUEST_TIMEOUT: ${DOC2AGENT_REQUEST_TIMEOUT:-60}
      DOC2AGENT_MAX_BODY_SIZE: ${DOC2AGENT_MAX_BODY_SIZE:-52428800}
      DOC2AGENT_EXTRACTION_CONCURRENCY: ${DOC2AGENT_EXTRACTION_CONCURRENCY:-8}
      DOC2AGENT_OCR_CONCURRENCY: ${DOC2AGENT_OCR_CONCURRENCY:-1}
      DOC2AGENT_SESSION_POOL_SIZE: ${DOC2AGENT_SESSION_POOL_SIZE:-1}
      DOC2AGENT_MAX_BATCH: ${DOC2AGENT_MAX_BATCH:-8}
      DOC2AGENT_INTRA_THREADS: ${DOC2AGENT_INTRA_THREADS:-0}
      DOC2AGENT_INTER_THREADS: ${DOC2AGENT_INTER_THREADS:-0}
      DOC2AGENT_DEVICE_ID: -1
      DOC2AGENT_PDFIUM_ENABLED: ${DOC2AGENT_PDFIUM_ENABLED:-false}
      RUST_LOG: ${RUST_LOG:-doc2agent=info,tower_http=info}
    volumes:
      - ./models:/models:ro
