services:
  doc2msg:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CARGO_FEATURES: ${DOC2MSG_BUILD_FEATURES:-cuda-ep}
    image: doc2msg:cuda
    init: true
    restart: unless-stopped
    gpus: all
    ports:
      - "${DOC2MSG_PUBLISHED_PORT:-8080}:3000"
    environment:
      DOC2MSG_HOST: 0.0.0.0
      DOC2MSG_PORT: 3000
      DOC2MSG_DET_MODEL: /models/det_model.onnx
      DOC2MSG_MODEL_PATH: /models/rec_model.onnx
      DOC2MSG_DICT_PATH: /models/ppocr_keys_v1.txt
      DOC2MSG_REQUEST_TIMEOUT: ${DOC2MSG_REQUEST_TIMEOUT:-60}
      DOC2MSG_MAX_BODY_SIZE: ${DOC2MSG_MAX_BODY_SIZE:-52428800}
      DOC2MSG_EXTRACTION_CONCURRENCY: ${DOC2MSG_EXTRACTION_CONCURRENCY:-16}
      DOC2MSG_OCR_CONCURRENCY: ${DOC2MSG_OCR_CONCURRENCY:-4}
      DOC2MSG_SESSION_POOL_SIZE: ${DOC2MSG_SESSION_POOL_SIZE:-4}
      DOC2MSG_MAX_BATCH: ${DOC2MSG_MAX_BATCH:-32}
      DOC2MSG_INTRA_THREADS: ${DOC2MSG_INTRA_THREADS:-1}
      DOC2MSG_INTER_THREADS: ${DOC2MSG_INTER_THREADS:-1}
      DOC2MSG_DEVICE_ID: ${DOC2MSG_DEVICE_ID:-0}
      DOC2MSG_PDFIUM_ENABLED: ${DOC2MSG_PDFIUM_ENABLED:-false}
      ORT_LIB_DIR: /opt/onnxruntime
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      RUST_LOG: ${RUST_LOG:-doc2msg=info,tower_http=info}
    volumes:
      - ./models:/models:ro
      # Optional pdfium mount:
      # - /absolute/path/to/pdfium:/opt/pdfium:ro

