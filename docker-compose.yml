services:
  doc2agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CARGO_FEATURES: ${DOC2AGENT_BUILD_FEATURES:-cuda-ep}
    image: doc2agent:cuda
    init: true
    restart: unless-stopped
    gpus: all
    ports:
      - "${DOC2AGENT_PUBLISHED_PORT:-8080}:3000"
    environment:
      DOC2AGENT_HOST: 0.0.0.0
      DOC2AGENT_PORT: 3000
      DOC2AGENT_DET_MODEL: /models/det_model.onnx
      DOC2AGENT_MODEL_PATH: /models/rec_model.onnx
      DOC2AGENT_DICT_PATH: /models/ppocr_keys_v1.txt
      DOC2AGENT_REQUEST_TIMEOUT: ${DOC2AGENT_REQUEST_TIMEOUT:-60}
      DOC2AGENT_MAX_BODY_SIZE: ${DOC2AGENT_MAX_BODY_SIZE:-52428800}
      DOC2AGENT_EXTRACTION_CONCURRENCY: ${DOC2AGENT_EXTRACTION_CONCURRENCY:-16}
      DOC2AGENT_OCR_CONCURRENCY: ${DOC2AGENT_OCR_CONCURRENCY:-4}
      DOC2AGENT_SESSION_POOL_SIZE: ${DOC2AGENT_SESSION_POOL_SIZE:-4}
      DOC2AGENT_MAX_BATCH: ${DOC2AGENT_MAX_BATCH:-32}
      DOC2AGENT_INTRA_THREADS: ${DOC2AGENT_INTRA_THREADS:-1}
      DOC2AGENT_INTER_THREADS: ${DOC2AGENT_INTER_THREADS:-1}
      DOC2AGENT_DEVICE_ID: ${DOC2AGENT_DEVICE_ID:-0}
      DOC2AGENT_PDFIUM_ENABLED: ${DOC2AGENT_PDFIUM_ENABLED:-false}
      ORT_LIB_DIR: /opt/onnxruntime
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      RUST_LOG: ${RUST_LOG:-doc2agent=info,tower_http=info}
    volumes:
      - ./models:/models:ro
      # Optional pdfium mount:
      # - /absolute/path/to/pdfium:/opt/pdfium:ro

